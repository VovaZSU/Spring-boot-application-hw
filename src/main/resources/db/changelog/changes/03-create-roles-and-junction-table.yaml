databaseChangeLog:
  - changeSet:
      id: create-roles-and-junction-table
      author: Volodymyr Havrylenko
      changes:
        - createTable:
            tableName: roles
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
        - createTable:
            tableName: users_roles
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_users_roles_user
                    referencedTableName: users
                    referencedColumnNames: id
              - column:
                  name: role_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_users_roles_role
                    referencedTableName: roles
                    referencedColumnNames: id
        - addUniqueConstraint:
            columnNames: user_id, role_id
            constraintName: uc_users_roles
            tableName: users_roles
