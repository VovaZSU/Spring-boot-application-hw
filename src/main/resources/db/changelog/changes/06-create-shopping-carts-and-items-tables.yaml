databaseChangeLog:
  - changeSet:
      id: create-shopping-carts-and-items-tables
      author: Volodymyr Havrylenko
      changes:
        - createTable:
            tableName: shopping_carts
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
                    foreignKeyName: fk_shopping_carts_users
                    referencedTableName: users
                    referencedColumnNames: id
              - column:
                  name: is_deleted
                  type: BOOLEAN
                  defaultValueBoolean: false

        - createTable:
            tableName: cart_items
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: shopping_cart_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_cart_items_shopping_carts
                    referencedTableName: shopping_carts
                    referencedColumnNames: id
              - column:
                  name: book_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_cart_items_books
                    referencedTableName: books
                    referencedColumnNames: id
              - column:
                  name: quantity
                  type: INT
                  constraints:
                    nullable: false
